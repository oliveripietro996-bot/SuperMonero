manifestVersion: 1.1
id: brainchainz-monero-superpay
category: finance
name: Monero SuperPay
icon: https://raw.githubusercontent.com/brainchainz/Monero-Superbrain/main/brainchainz-monero-superpay/icon.png
version: "1.0.0"
tagline: Accept Monero payments with a full point-of-sale system
description: >-
  Monero SuperPay is a self-hosted, trustless point-of-sale system for
  accepting Monero (XMR) payments. Connect multiple PoS devices via QR code,
  manage a product catalog, process orders with a shopping cart, and track
  payments in real-time — all without third parties.

  Features include a web dashboard, product catalog with images, three PoS modes
  (keypad, product grid, full cart), multi-device management, order tracking,
  and sales analytics. Any tablet with a browser becomes a register.

  View-only wallet — your spend keys never leave your device.
