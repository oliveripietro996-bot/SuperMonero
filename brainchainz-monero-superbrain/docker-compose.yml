services:
  app_proxy:
    image: getumbrel/app-proxy:1.0.0
    restart: on-failure
    environment:
      APP_HOST: monero_superbrain_dashboard
      APP_PORT: 3000
    networks:
      - default

  # Dashboard semplice e bella (senza cartelle extra)
  dashboard:
    image: nginx:alpine
    restart: always
    volumes:
      - ${APP_DATA_DIR}/dashboard:/usr/share/nginx/html:ro
    networks:
      - default

  p2pool:
    image: sethsimmons/p2pool:latest
    restart: always
    entrypoint: /bin/sh
    command: >
      -c "WALLET=\"$${WALLET_ADDRESS:-43sEimq64TtLoBaEzzxf7wVd4XcZPuGtNRP7zhT7WAgB3th9dvCrJMad99pZNKBRDmJXXXUxeZie7W5tsm7TWVrPHbxvins}\"; 
          exec p2pool --wallet $$WALLET --host monero_monerod_1 --rpc-port 18081 --zmq-port 18083 
          --stratum 0.0.0.0:3333 --p2p 0.0.0.0:37889 
          --addpeers 65.21.227.114:37888,node.sethforprivacy.com:37888 
          --loglevel 3 --mini"
    volumes:
      - ${APP_DATA_DIR}/p2pool:/data
    networks:
      - default

  xmrig-proxy:
    image: techcf/xmrig-proxy:latest
    restart: always
    command: xmrig-proxy -o p2pool:3333 -u SuperbrainProxy -b 0.0.0.0:8888 --http-host 0.0.0.0 --http-port 8080
    volumes:
      - ${APP_DATA_DIR}/proxy:/data
    networks:
      - default

  xmrig:
    image: minerboy/xmrig:latest
    restart: always
    privileged: true
    depends_on:
      - xmrig-proxy
    entrypoint: /bin/sh
    command: >
      -c "THREADS=\"$${XMRIG_THREADS:-0}\"; 
          echo 1280 > /proc/sys/vm/nr_hugepages 2>/dev/null || true; 
          sleep 2; 
          THREAD_ARG=''; 
          if [ \"$$THREADS\" != '0' ]; then THREAD_ARG=\"--threads $$THREADS\"; fi; 
          exec /app/xmrig -o xmrig-proxy:8888 -u '$${WALLET_ADDRESS:-Sup3rBra1n}' 
          -p x --coin monero --donate-level 0 -k --randomx-1gb-pages --huge-pages-jit $$THREAD_ARG"
    volumes:
      - ${APP_DATA_DIR}:/data
    networks:
      - default

networks:
  default:
    driver: bridge
