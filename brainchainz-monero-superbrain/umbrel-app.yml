manifestVersion: 1.1
id: brainchainz-monero-superbrain
category: utilities
name: Monero Superbrain
icon: https://raw.githubusercontent.com/brainchainz/Monero-Superbrain/main/brainchainz-monero-superbrain/icon.png
version: "1.0.0"
tagline: Decentralized Monero mining with P2Pool, XMRig, and web dashboard
description: >-
  Complete Monero mining setup featuring decentralized mining pool (P2Pool), miner connection manager (XMRig-proxy),
  CPU miner (XMRig), and a web dashboard for monitoring and control. Connects to your existing Umbrel Monero node.
  Supports LAN worker and Tailscale connections.
