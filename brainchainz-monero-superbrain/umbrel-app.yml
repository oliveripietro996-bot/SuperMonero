support: https://github.com/brainchainz/Monero-Superbrain/issues
port: 3000
dependencies:
  - monero
gallery:
  - https://raw.githubusercontent.com/brainchainz/Monero-Superbrain/main/brainchainz-monero-superbrain/gallery/1.png
  - https://raw.githubusercontent.com/brainchainz/Monero-Superbrain/main/brainchainz-monero-superbrain/gallery/2.png
  - https://raw.githubusercontent.com/brainchainz/Monero-Superbrain/main/brainchainz-monero-superbrain/gallery/3.png
  - https://raw.githubusercontent.com/brainchainz/Monero-Superbrain/main/brainchainz-monero-superbrain/gallery/4.png
path: ""
